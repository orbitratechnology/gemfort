<body class="min-h-screen pb-20">
<!-- Top App Bar (Transactional, no nav shell) -->

<h1 class="font-headline-md-mobile text-headline-md-mobile text-primary font-bold">Record AP</h1>
</div>

</button>

<main class="px-container-margin pt-section-gap pb-section-gap max-w-md mx-auto">

<div class="glass-card rounded-xl p-4 flex gap-4 items-center">

</div>
<div class="flex-1">
<div class="flex items-center gap-2 mb-1">
<span class="bg-primary-container text-on-primary-container px-2 py-0.5 rounded-full font-label-md text-label-md">AP-4921</span>
<span class="text-text-muted font-body-md text-body-md">Ref: 992-B</span>
</div>
<h3 class="font-headline-sm text-headline-sm text-on-surface leading-tight">3.24ct Blue Sapphire</h3>

</div>

<!-- Action Form -->
<form class="space-y-section-gap">
<!-- Outcome Selection -->
<div>
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-stack-md">Outcome</h2>
<div class="grid grid-cols-2 gap-gutter-md">
<!-- Sold Option -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="ap_outcome" type="radio" value="sold"/>
<div class="h-full glass-card rounded-xl p-4 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary-fixed/20 transition-all flex flex-col items-center justify-center gap-3">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center peer-checked:bg-primary peer-checked:text-on-primary transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<span class="font-headline-sm text-headline-sm text-center">Sold</span>
</div>
<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 text-primary transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</label>
<!-- Returned Option -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="ap_outcome" type="radio" value="returned"/>
<div class="h-full glass-card rounded-xl p-4 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary-fixed/20 transition-all flex flex-col items-center justify-center gap-3">

<div class="absolute top-3 right-3 opacity-0 peer-checked:opacity-100 text-primary transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</label>
</div>
</div>
<!-- Conditional Input: Sale Details (Visible when Sold is selected) -->

<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1 ml-1" for="final_price">Final Sale Price (USD)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-headline-sm text-headline-sm">$</span>
<input class="input-glass w-full rounded-full py-3 pl-8 pr-4 font-body-lg text-body-lg text-on-surface h-[52px]" id="final_price" name="final_price" placeholder="0.00" type="number" value="4500.00"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1 ml-1" for="buyer_name">Buyer/Client</label>
<input class="input-glass w-full rounded-full py-3 px-4 font-body-lg text-body-lg text-on-surface h-[52px]" id="buyer_name" name="buyer_name" placeholder="Search or enter name" type="text"/>
</div>
</div>
<!-- Conditional Input: Return Notes (Visible when Returned is selected) - Hidden initially -->
<div class="space-y-stack-md hidden opacity-0 transition-opacity duration-300" id="return_details_section">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Return Details</h2>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1 ml-1" for="return_notes">Reason / Notes (Optional)</label>
<textarea class="input-glass w-full rounded-xl py-3 px-4 font-body-lg text-body-lg text-on-surface resize-none" id="return_notes" name="return_notes" placeholder="e.g., Client preferred a different cut" rows="3"></textarea>
</div>
</div>
<!-- Action Button -->
<div class="pt-stack-md">
<button class="w-full bg-secondary-fixed-dim text-on-secondary-fixed hover:opacity-90 transition-opacity font-headline-md-mobile text-headline-md-mobile py-4 rounded-full flex items-center justify-center gap-2 h-[56px] shadow-lg shadow-secondary-fixed-dim/20" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">done_all</span>
                    Confirm AP Record
                </button>
</div>
</form>
</main>
<script>
        // Simple logic to toggle sections based on radio selection
        const radioSold = document.querySelector('input[value="sold"]');
        const radioReturned = document.querySelector('input[value="returned"]');
        const saleSection = document.getElementById('sale_details_section');
        const returnSection = document.getElementById('return_details_section');

        function updateSections() {
            if (radioSold.checked) {
                saleSection.classList.remove('hidden');
                // slight delay for transition
                setTimeout(() => {
                    saleSection.classList.remove('opacity-0');
                    saleSection.classList.add('opacity-100');
                }, 10);
                
                returnSection.classList.remove('opacity-100');
                returnSection.classList.add('opacity-0');
                setTimeout(() => returnSection.classList.add('hidden'), 300);

            } else {
                returnSection.classList.remove('hidden');
                 setTimeout(() => {
                    returnSection.classList.remove('opacity-0');
                    returnSection.classList.add('opacity-100');
                }, 10);

                saleSection.classList.remove('opacity-100');
                saleSection.classList.add('opacity-0');
                setTimeout(() => saleSection.classList.add('hidden'), 300);
            }
        }

        radioSold.addEventListener('change', updateSections);
        radioReturned.addEventListener('change', updateSections);
    </script>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GemVault - Add Gem</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "on-secondary-fixed": "#241a00",
                    "on-primary-container": "#7b93b1",
                    "warning-amber": "#D97706",
                    "surface-container-low": "#f3f4f5",
                    "inverse-primary": "#b1c8e8",
                    "outline": "#74777e",
                    "success-emerald": "#2D6A4F",
                    "on-surface-variant": "#43474d",

                    "inverse-surface": "#2e3132",
                    "tertiary": "#211200",

                    "on-primary": "#ffffff",
                    "surface": "#f8f9fa",

                    "primary-fixed-dim": "#b1c8e8",
                    "on-primary-fixed-variant": "#314863",

                    "inverse-on-surface": "#f0f1f2",

            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "section-gap": "32px",
                    "stack-sm": "8px",
                    "gutter-md": "16px",
                    "stack-md": "12px",
                    "container-margin": "20px"
            },
            "fontFamily": {

<style>
        .ambient-shadow {
            box-shadow: 0 15px 30px rgba(0, 22, 44, 0.05);
        }
        .form-input-soft {
            background-color: #F1F5F9;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .form-input-soft:focus {
            background-color: #ffffff;
            border-color: #00162c;
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 22, 44, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative pb-[100px]">
<!-- Top Navigation (Task-focused, suppressed main nav) -->
<header class="sticky top-0 z-40 bg-surface-glass backdrop-blur-md dark:bg-inverse-surface/70 w-full">
<div class="flex justify-between items-center px-container-margin py-stack-md w-full">
<button aria-label="Go back" class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-sm-mobile text-headline-sm-mobile font-bold text-primary">Add Gem</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-grow px-container-margin py-gutter-md flex flex-col gap-section-gap max-w-md mx-auto w-full">
<!-- Step Indicator -->
<div class="flex justify-between items-center w-full px-4 mb-4">
<div class="flex flex-col items-center gap-1 w-1/3">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-md">1</div>
<span class="font-label-md text-primary">Details</span>
</div>
<div class="h-[2px] bg-primary flex-grow mx-2"></div>
<div class="flex flex-col items-center gap-1 w-1/3 opacity-50">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center font-label-md">2</div>
<span class="font-label-md text-on-surface-variant">Photos</span>
</div>
<div class="h-[2px] bg-surface-variant flex-grow mx-2"></div>
<div class="flex flex-col items-center gap-1 w-1/3 opacity-50">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center font-label-md">3</div>
<span class="font-label-md text-on-surface-variant">Review</span>
</div>
</div>
<!-- Form Section -->
<section class="bg-surface-container-lowest rounded-xl p-gutter-md ambient-shadow flex flex-col gap-stack-md">
<div class="flex flex-col gap-1">
<label class="font-label-md text-on-surface-variant" for="gemType">Gem Type</label>
<div class="relative">
<select class="form-input-soft w-full rounded-lg px-4 py-3 appearance-none font-body-md text-text-main" id="gemType">
<option disabled="" selected="" value="">Select a gem type...</option>
<option value="diamond">Diamond</option>
<option value="sapphire">Sapphire</option>
<option value="ruby">Ruby</option>
<option value="emerald">Emerald</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<div class="flex gap-stack-md">
<div class="flex flex-col gap-1 flex-1">
<label class="font-label-md text-on-surface-variant" for="weight">Weight (ct)</label>
<input class="form-input-soft w-full rounded-lg px-4 py-3 font-body-md text-text-main" id="weight" placeholder="0.00" step="0.01" type="number"/>
</div>
<div class="flex flex-col gap-1 flex-1">
<label class="font-label-md text-on-surface-variant" for="price">Purchase Price</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-outline font-body-md">$</span>
<input class="form-input-soft w-full rounded-lg pl-8 pr-4 py-3 font-body-md text-text-main" id="price" placeholder="0.00" type="number"/>
</div>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-on-surface-variant" for="origin">Origin</label>
<input class="form-input-soft w-full rounded-lg px-4 py-3 font-body-md text-text-main" id="origin" placeholder="e.g. Sri Lanka, Colombia" type="text"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-on-surface-variant" for="treatment">Treatment</label>
<div class="relative">
<select class="form-input-soft w-full rounded-lg px-4 py-3 appearance-none font-body-md text-text-main" id="treatment">
<option value="none">None (Untreated)</option>
<option value="heat">Heated</option>
<option value="oil">Oiled</option>
<option value="irradiation">Irradiated</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
</section>
<!-- Photo Upload Placeholder -->
<section class="bg-surface-container-lowest rounded-xl p-gutter-md ambient-shadow flex flex-col gap-stack-sm items-center justify-center border-2 border-dashed border-outline-variant/50 min-h-[160px] cursor-pointer hover:bg-surface-container-low transition-colors">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-primary font-bold">add_a_photo</span>
</div>
<h3 class="font-headline-sm-mobile text-headline-sm-mobile text-primary">Upload Gem Photo</h3>
<p class="font-body-md text-text-muted text-center max-w-[200px]">Tap to open camera or select from gallery</p>
</section>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-container-margin bg-surface-glass backdrop-blur-xl border-t border-surface-variant/20 z-50">
<button class="w-full bg-primary text-on-primary font-headline-sm-mobile text-headline-sm-mobile py-4 rounded-full flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all ambient-shadow">
            Continue
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</body></html>
